<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Website Đang Bảo Trì</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#ff7b00;
  --secondary:#ffb347;
  --bg1:#081120;
  --bg2:#12223f;
  --text:#ffffff;
  --muted:#cbd5e1;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Be Vietnam Pro', Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(rgba(2,6,23,.82), rgba(2,6,23,.92)),
    url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1920&auto=format&fit=crop')
    center/cover fixed;
  color:var(--text);
  padding:20px;
}

.container{
  max-width:700px;
  width:100%;
  text-align:center;
  padding:50px 40px;
  border-radius:28px;
  background:linear-gradient(145deg, rgba(12,24,45,.94), rgba(22,38,70,.92));
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(14px);
  box-shadow:0 20px 60px rgba(0,0,0,.45);
  animation:fadeIn 1s ease;
}

.icon{
  width:120px;
  height:120px;
  margin:0 auto 25px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:56px;
  background:linear-gradient(135deg, var(--primary), var(--secondary));
  box-shadow:0 15px 35px rgba(255,123,0,.35);
  animation:pulse 2s infinite;
}

h1{
  font-size:42px;
  font-weight:800;
  margin-bottom:18px;
  background:linear-gradient(90deg, #ffffff, #ffd8a8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  font-size:20px;
  line-height:1.8;
  color:var(--muted);
  margin-bottom:30px;
}

.progress{
  width:100%;
  height:14px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,.08);
  margin-bottom:20px;
}

.progress-bar{
  height:100%;
  width:70%;
  border-radius:999px;
  background:linear-gradient(90deg, var(--primary), var(--secondary));
  animation:loading 2.5s ease-in-out infinite alternate;
}

.note{
  font-size:15px;
  color:#94a3b8;
}

.footer{
  margin-top:30px;
  font-size:14px;
  color:#64748b;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}

@keyframes loading{
  from{width:30%;}
  to{width:90%;}
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media (max-width:768px){
  .container{
    padding:40px 25px;
  }

  .icon{
    width:100px;
    height:100px;
    font-size:46px;
  }

  h1{
    font-size:30px;
  }

  p{
    font-size:18px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="icon">🛠️</div>

  <h1>Website Đang Bảo Trì</h1>

  <p>
    Hệ thống hiện đang được nâng cấp để mang đến trải nghiệm tốt hơn cho bạn.<br>
    Vui lòng quay lại sau ít phút. Xin chân thành cảm ơn!
  </p>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <div class="note">
    ⏳ Chúng tôi đang cập nhật tính năng mới và tối ưu hiệu suất hệ thống.
  </div>

  <div class="footer">
    © 2026 Thiết Kế Bởi Mr.Thiên
  </div>
</div>

</body>
</html>
